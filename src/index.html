<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <!-- Apply stored theme/language before first paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('jb-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-bs-theme', t);
        }
        var l = localStorage.getItem('jb-lang');
        if (l === 'es' || l === 'en') {
          document.documentElement.setAttribute('lang', l);
        }
      } catch (e) {}
    })();
  </script>
  <title>Joaquín Betes — Full-Stack Developer &amp; IA</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO -->
  <meta name="description" content="Portfolio de Joaquín Betes — Desarrollador Full-Stack y de IA. Backend .NET, LLMs, automatización y datos. Estudiante de Ciencia de Datos (UGR).">
  <meta name="author" content="Joaquín Antonio Betes">
  <meta name="theme-color" content="#0b0f14">
  <meta name="color-scheme" content="dark light">

  <!-- Open Graph / social -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Joaquín Betes — Full-Stack Developer & IA">
  <meta property="og:description" content="Desarrollador Full-Stack y de IA. Backend .NET, LLMs, automatización y datos. Estudiante de Ciencia de Datos (UGR).">
  <meta property="og:url" content="https://joaquinbetes.github.io/joaquin_betes_portfolio/">
  <meta property="og:image" content="https://joaquinbetes.github.io/joaquin_betes_portfolio/assets/images/profile.jpg">
  <meta name="twitter:card" content="summary">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
