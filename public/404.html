<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Joaquín Betes</title>
  <script>
    // GitHub Pages SPA fallback: send unknown paths back to the app root
    // (first path segment is the project/repo name).
    (function () {
      var segment = location.pathname.split('/').filter(Boolean)[0];
      location.replace(location.origin + (segment ? '/' + segment + '/' : '/'));
    })();
  </script>
</head>
<body></body>
</html>
